name: Release

on:
  push:
    tags:
      - 'v*'   # Trigger bei Tags wie v1.0.0, v1.2.3 etc.

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: IntegrationBuddy ${{ github.ref_name }}
          releaseBody: |
            ## Was ist neu?
            Siehe [CHANGELOG](https://github.com/integrationbuddy/integrationbuddy-app/blob/main/CHANGELOG.md) für Details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
